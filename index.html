<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wick Bot Pro Dashboard</title>
    <script src="https://telegram.org"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --bg: #0a0f1e; --card: rgba(255, 255, 255, 0.07); --primary: #38bdf8; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-badge { background: rgba(34, 197, 94, 0.2); color: var(--green); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--green); }
        
        .main-card { background: var(--card); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .balance-label { opacity: 0.6; font-size: 0.9rem; }
        .balance-value { font-size: 2.2rem; font-weight: 800; margin: 5px 0; }
        .profit-chip { display: inline-block; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 1rem; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; border-radius: 12px; padding: 15px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        button:active { transform: scale(0.96); }
        .btn-run { background: var(--green); }
        .btn-stop { background: #f59e0b; }
        .btn-panic { background: var(--red); grid-column: span 2; margin-top: 5px; }
        .btn-sec { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size: 1.2rem;">Wick Bot <span style="color:var(--primary)">Pro</span></h2>
        <div class="status-badge">● LIVE</div>
    </div>

    <div class="main-card">
        <div class="balance-label">SOLDE TOTAL (USD)</div>
        <div class="balance-value" id="balance">$0.00</div>
        <div class="profit-chip" id="profit-bg">
            <span id="profit">+$0.00</span>
        </div>
        <canvas id="miniChart" style="max-height: 60px; margin-top: 15px;"></canvas>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <div class="balance-label">Positions</div>
            <div style="font-size: 1.2rem; font-weight: bold;" id="pos-count">0</div>
        </div>
        <div class="stat-item">
            <div class="balance-label">Win Rate</div>
            <div style="font-size: 1.2rem; font-weight: bold; color: var(--primary)">--%</div>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-run" onclick="send('/run')">▶ DEMARRER</button>
        <button class="btn-stop" onclick="send('/stop')">⏸ PAUSE</button>
        <button class="btn-sec" onclick="send('/balance')">💰 SOLDE</button>
        <button class="btn-sec" onclick="send('/status')">⚙️ INFOS</button>
        <button class="btn-panic" onclick="send('/panic')">🆘 FERMETURE D'URGENCE</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // REMPLACEZ CETTE URL PAR VOTRE LIEN FIREBASE (avec .json à la fin)
        const FIREBASE_URL = "https://firebasedatabase.app";

        function updateUI() {
            fetch(FIREBASE_URL)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('balance').innerText = "$" + data.solde.toLocaleString();
                    const p = data.profit;
                    const pEl = document.getElementById('profit');
                    const pBg = document.getElementById('profit-bg');
                    
                    if(p >= 0) {
                        pEl.innerText = "+$" + p;
                        pBg.style.background = "rgba(34, 197, 94, 0.2)";
                        pEl.style.color = var(--green);
                    } else {
                        pEl.innerText = "-$" + Math.abs(p);
                        pBg.style.background = "rgba(239, 68, 68, 0.2)";
                        pEl.style.color = var(--red);
                    }
                });
        }

        function send(cmd) { tg.sendData(cmd); }
        setInterval(updateUI, 5000);
        updateUI();
    </script>
</body>
</html>
